<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>kabu-advisor</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3248; --accent: #4f8ef7; --accent2: #7c5cbf;
      --green: #34d399; --red: #f87171; --yellow: #fbbf24;
      --text: #e2e8f0; --text2: #94a3b8; --radius: 12px;
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    #app { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

    /* ヘッダー */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header-title { font-size: 17px; font-weight: 700; color: var(--accent); }
    .header-date { color: var(--text2); font-size: 12px; }
    .asset-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .asset-box { flex: 1; background: var(--surface2); border-radius: 8px; padding: 8px; text-align: center; }
    .asset-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
    .asset-value { font-size: 15px; font-weight: 700; }
    .green { color: var(--green); } .yellow { color: var(--yellow); } .red { color: var(--red); }
    .progress-wrap { }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 3px; }
    .progress-bar { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .5s; }

    /* タブ */
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 11px 4px; text-align: center; font-size: 12px; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-content { display: none; padding: 14px 16px; }
    .tab-content.active { display: block; }

    /* ボタン */
    .btn { width: 100%; padding: 13px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--green); color: #0f1117; }
    .btn:active:not(:disabled) { opacity: .75; }

    /* カード */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .card-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }

    /* 提案 */
    .proposal-box { background: var(--surface2); border-radius: var(--radius); padding: 14px; white-space: pre-wrap; line-height: 1.75; font-size: 13px; }
    .confidence-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .conf-high { background: rgba(52,211,153,.2); color: var(--green); }
    .conf-mid  { background: rgba(251,191,36,.2);  color: var(--yellow); }
    .conf-low  { background: rgba(248,113,113,.2); color: var(--red); }

    /* 折りたたみ */
    .collapsible { margin-bottom: 8px; }
    .col-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: 8px; padding: 11px 12px; cursor: pointer; }
    .col-header span { font-size: 13px; font-weight: 600; }
    .col-arrow { transition: transform .2s; color: var(--text2); }
    .collapsible.open .col-arrow { transform: rotate(180deg); }
    .col-body { display: none; background: var(--surface2); border-radius: 0 0 8px 8px; padding: 12px; white-space: pre-wrap; font-size: 12px; line-height: 1.7; color: var(--text2); }
    .collapsible.open .col-body { display: block; }

    /* フォーム */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .form-input { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }

    /* ポートフォリオ */
    .port-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .port-left { flex: 1; min-width: 0; }
    .port-left .ticker { font-weight: 700; font-size: 13px; }
    .port-left .detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .port-right { text-align: right; }
    .port-right .pnl { font-weight: 700; font-size: 13px; }

    /* 結果入力 */
    .trade-input { background: var(--surface2); border-radius: 8px; padding: 12px; margin-bottom: 8px; position: relative; }
    .trade-input-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text2); }
    .trade-remove { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; }

    /* スピナー */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { text-align: center; padding: 16px; color: var(--text2); font-size: 13px; }

    /* 履歴 */
    .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
    .history-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .history-date { font-weight: 700; font-size: 13px; }
    .history-preview { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .trade-chip { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 700; margin: 2px; }
    .chip-buy  { background: rgba(79,142,247,.2); color: var(--accent); }
    .chip-sell { background: rgba(248,113,113,.2); color: var(--red); }
    .chip-hold { background: rgba(148,163,184,.15); color: var(--text2); }

    /* トースト */
    #toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; white-space: nowrap; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">kabu-advisor</div>
      <div class="header-date" id="hdr-date"></div>
    </div>
    <div class="asset-row">
      <div class="asset-box">
        <div class="asset-label">現金</div>
        <div class="asset-value green" id="hdr-cash">---</div>
      </div>
      <div class="asset-box">
        <div class="asset-label">目標</div>
        <div class="asset-value yellow" id="hdr-target">---</div>
      </div>
      <div class="asset-box">
        <div class="asset-label">残り</div>
        <div class="asset-value" id="hdr-days">---</div>
      </div>
      <div class="asset-box">
        <div class="asset-label">累計損益</div>
        <div class="asset-value" id="hdr-pnl">---</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>目標進捗</span><span id="hdr-pct">--%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="hdr-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="today" onclick="showTab(this,'today')">今日</button>
    <button class="tab-btn" data-tab="detail" onclick="showTab(this,'detail')">議論詳細</button>
    <button class="tab-btn" data-tab="portfolio" onclick="showTab(this,'portfolio')">保有</button>
    <button class="tab-btn" data-tab="history" onclick="showTab(this,'history')">履歴</button>
    <button class="tab-btn" data-tab="settings" onclick="showTab(this,'settings')">設定</button>
  </div>

  <!-- 今日タブ -->
  <div id="tab-today" class="tab-content active">
    <div id="not-configured" class="status-msg" style="display:none">設定タブから初期設定を行ってください。</div>
    <div id="today-main" style="display:none">
      <div class="card">
        <div id="gen-msg" class="status-msg" style="display:none"></div>
        <button class="btn btn-primary" id="btn-gen" onclick="generate()">今日の打ち手を生成</button>
        <p style="font-size:11px;color:var(--text2);text-align:center;margin-top:7px">※ Claude APIを5回呼び出します（数分かかります）</p>
      </div>
      <div id="proposal-area" style="display:none">
        <div class="card">
          <div class="card-title">本日のトレード指示</div>
          <div id="conf-badge" class="confidence-badge"></div>
          <div id="final-proposal" class="proposal-box"></div>
        </div>
        <!-- 結果記録 -->
        <div class="card" id="result-card">
          <div class="card-title">取引結果を記録</div>
          <p style="font-size:12px;color:var(--text2);margin-bottom:10px">実際に行った取引を記録してください。</p>
          <div id="trade-inputs"></div>
          <button onclick="addTradeInput()" style="width:100%;padding:9px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:12px">＋ 取引を追加</button>
          <button class="btn btn-success" onclick="saveResult()">結果を保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 議論詳細タブ -->
  <div id="tab-detail" class="tab-content">
    <div id="detail-empty" class="status-msg">今日の提案を先に生成してください。</div>
    <div id="detail-content" style="display:none">
      <div class="collapsible" id="col-screen">
        <div class="col-header" onclick="toggleCol('col-screen')"><span>銘柄スクリーニング</span><span class="col-arrow">▼</span></div>
        <div class="col-body" id="col-screen-body"></div>
      </div>
      <div class="collapsible" id="col-bull">
        <div class="col-header" onclick="toggleCol('col-bull')"><span>強気アナリスト</span><span class="col-arrow">▼</span></div>
        <div class="col-body" id="col-bull-body"></div>
      </div>
      <div class="collapsible" id="col-bear">
        <div class="col-header" onclick="toggleCol('col-bear')"><span>弱気アナリスト</span><span class="col-arrow">▼</span></div>
        <div class="col-body" id="col-bear-body"></div>
      </div>
      <div class="collapsible" id="col-risk">
        <div class="col-header" onclick="toggleCol('col-risk')"><span>リスク管理官</span><span class="col-arrow">▼</span></div>
        <div class="col-body" id="col-risk-body"></div>
      </div>
    </div>
  </div>

  <!-- 保有タブ -->
  <div id="tab-portfolio" class="tab-content">
    <div class="card">
      <div class="card-title">現在の保有銘柄</div>
      <div id="portfolio-list"><div class="status-msg">保有なし</div></div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-title">取引を手動記録（提案消失時の復旧用）</div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">通常は今日タブの「取引結果を記録」を使ってください。</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">銘柄コード（例: 3626.T）</label>
          <input class="form-input" id="manual-ticker" type="text" placeholder="3626.T" />
        </div>
        <div class="form-group">
          <label class="form-label">社名</label>
          <input class="form-input" id="manual-name" type="text" placeholder="TIS" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">売買</label>
          <select class="form-input" id="manual-action">
            <option value="buy">買い</option>
            <option value="sell">売り</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">株数</label>
          <input class="form-input" id="manual-shares" type="number" placeholder="10" />
        </div>
        <div class="form-group">
          <label class="form-label">約定価格（円）</label>
          <input class="form-input" id="manual-price" type="number" placeholder="2500" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="manualRecord()">記録する</button>
    </div>
  </div>

  <!-- 履歴タブ -->
  <div id="tab-history" class="tab-content">
    <div id="history-list"><div class="status-msg">読み込み中...</div></div>
  </div>

  <!-- 設定タブ -->
  <div id="tab-settings" class="tab-content">
    <div class="card">
      <div class="card-title">投資目標</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">元手（円）</label>
          <input class="form-input" id="set-capital" type="number" placeholder="1000000" />
        </div>
        <div class="form-group">
          <label class="form-label">現在の現金（円）</label>
          <input class="form-input" id="set-cash" type="number" placeholder="1000000" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">目標金額（円）</label>
          <input class="form-input" id="set-target" type="number" placeholder="1500000" />
        </div>
        <div class="form-group">
          <label class="form-label">期日</label>
          <input class="form-input" id="set-deadline" type="date" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">設定を保存</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
let proposalId = null;
let tradeCount = 0;

// ── 初期化 ────────────────────────────────────────────────────────────────
(async function init() {
  document.getElementById('hdr-date').textContent =
    new Date().toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', weekday: 'short' });
  await loadStatus();
  await loadTodayProposal();

  // ページロード時にポーリング状態を復元
  const s = await fetch('/api/generate/status').then(r => r.json()).catch(() => ({}));
  if (s.status === 'running') {
    const btn = document.getElementById('btn-gen');
    const msg = document.getElementById('gen-msg');
    btn.disabled = true;
    msg.style.display = 'block';
    msg.innerHTML = '<span class="spinner"></span>AIが分析中（前回の続き）...';
    _startPolling(msg, btn);
  }
})();

// ── ステータス ─────────────────────────────────────────────────────────────
async function loadStatus() {
  const data = await fetch('/api/status').then(r => r.json()).catch(() => ({}));
  if (!data.configured) {
    document.getElementById('not-configured').style.display = 'block';
    document.getElementById('today-main').style.display = 'none';
    return;
  }
  document.getElementById('not-configured').style.display = 'none';
  document.getElementById('today-main').style.display = 'block';

  document.getElementById('hdr-cash').textContent = (data.current_cash || 0).toLocaleString() + '円';
  document.getElementById('hdr-target').textContent = (data.target_amount || 0).toLocaleString() + '円';
  document.getElementById('hdr-days').textContent = (data.remaining_days ?? '--') + '日';

  const pnl = data.total_pnl || 0;
  const pnlEl = document.getElementById('hdr-pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toLocaleString() + '円';
  // 利益=緑、損失=赤（日本株標準）
  pnlEl.className = 'asset-value ' + (pnl > 0 ? 'green' : pnl < 0 ? 'red' : '');

  // 進捗（元手→目標）
  if (data.capital && data.target_amount && data.capital < data.target_amount) {
    const pct = Math.max(0, Math.round((pnl) / (data.target_amount - data.capital) * 100));
    document.getElementById('hdr-pct').textContent = pct + '%';
    document.getElementById('hdr-fill').style.width = Math.min(pct, 100) + '%';
  }

  // ポートフォリオ表示
  renderPortfolio(data.portfolio || []);

  // 設定フォームに反映
  if (data.capital)       document.getElementById('set-capital').value = data.capital;
  if (data.current_cash)  document.getElementById('set-cash').value = data.current_cash;
  if (data.target_amount) document.getElementById('set-target').value = data.target_amount;
  if (data.deadline)      document.getElementById('set-deadline').value = data.deadline;
}

// ── ポートフォリオ描画 ──────────────────────────────────────────────────────
function renderPortfolio(portfolio) {
  const el = document.getElementById('portfolio-list');
  if (!portfolio.length) {
    el.innerHTML = '<div class="status-msg">保有なし</div>';
    return;
  }
  el.innerHTML = portfolio.map(p => `
    <div class="port-item" id="port-${p.ticker}">
      <div class="port-left">
        <div class="ticker">${p.ticker} <span style="font-size:12px;color:var(--text2)">${p.company_name || ''}</span></div>
        <div class="detail">${p.shares}株 @ ${Math.round(p.avg_price).toLocaleString()}円</div>
      </div>
      <button onclick="startEditPortfolio('${p.ticker}','${p.company_name||''}',${p.shares},${p.avg_price})" style="flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600">編集</button>
    </div>
    <div id="port-edit-${p.ticker}" style="display:none;padding:10px;background:var(--card);border-radius:8px;margin-bottom:8px">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">社名</label>
          <input class="form-input" id="edit-name-${p.ticker}" type="text" value="${p.company_name||''}" />
        </div>
        <div class="form-group">
          <label class="form-label">株数</label>
          <input class="form-input" id="edit-shares-${p.ticker}" type="number" value="${p.shares}" />
        </div>
        <div class="form-group">
          <label class="form-label">平均取得単価（円）</label>
          <input class="form-input" id="edit-price-${p.ticker}" type="number" value="${Math.round(p.avg_price)}" />
        </div>
      </div>
      <button onclick="saveEditPortfolio('${p.ticker}')" class="btn btn-primary" style="margin-right:8px">保存</button>
      <button onclick="cancelEditPortfolio('${p.ticker}')" style="background:none;border:none;color:var(--text2);cursor:pointer">キャンセル</button>
    </div>`).join('');
}

function startEditPortfolio(ticker, name, shares, price) {
  document.getElementById(`port-${ticker}`).style.display = 'none';
  document.getElementById(`port-edit-${ticker}`).style.display = 'block';
}

function cancelEditPortfolio(ticker) {
  document.getElementById(`port-${ticker}`).style.display = 'flex';
  document.getElementById(`port-edit-${ticker}`).style.display = 'none';
}

async function saveEditPortfolio(ticker) {
  const name   = document.getElementById(`edit-name-${ticker}`).value.trim();
  const shares = parseInt(document.getElementById(`edit-shares-${ticker}`).value);
  const price  = parseFloat(document.getElementById(`edit-price-${ticker}`).value);
  if (isNaN(shares) || isNaN(price) || shares <= 0 || price <= 0) {
    toast('株数・単価を正しく入力してください');
    return;
  }
  const res = await fetch(`/api/portfolio/${ticker}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ company_name: name, shares, avg_price: price }),
  });
  if (res.ok) {
    toast('更新しました');
    await loadStatus();
  } else {
    toast('更新エラー');
  }
}

async function manualRecord() {
  const ticker = document.getElementById('manual-ticker').value.trim().toUpperCase();
  const name   = document.getElementById('manual-name').value.trim();
  const action = document.getElementById('manual-action').value;
  const shares = parseInt(document.getElementById('manual-shares').value);
  const price  = parseFloat(document.getElementById('manual-price').value);
  if (!ticker || isNaN(shares) || isNaN(price) || shares <= 0 || price <= 0) {
    toast('銘柄コード・株数・約定価格を正しく入力してください');
    return;
  }
  const res = await fetch('/api/result', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ trades: [{ ticker, company_name: name, action, shares, price, pnl: 0 }] }),
  });
  if (res.ok) {
    toast('記録しました');
    document.getElementById('manual-ticker').value = '';
    document.getElementById('manual-name').value = '';
    document.getElementById('manual-shares').value = '';
    document.getElementById('manual-price').value = '';
    await loadStatus();
  } else {
    toast('記録エラー');
  }
}

// ── 今日の提案読み込み ──────────────────────────────────────────────────────
async function loadTodayProposal() {
  const data = await fetch('/api/proposal/today').then(r => r.json()).catch(() => ({}));
  if (data.found) displayProposal(data);
}

// ── 提案生成（バックグラウンド生成 + ポーリング）──────────────────────────
let _pollTimer = null;

async function generate() {
  const btn = document.getElementById('btn-gen');
  const msg = document.getElementById('gen-msg');
  btn.disabled = true;
  msg.style.display = 'block';
  msg.innerHTML = '<span class="spinner"></span>AIが分析を開始しました（3〜5分かかります）...';

  try {
    const res = await fetch('/api/generate', { method: 'POST' });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      msg.textContent = 'エラー: ' + (data.detail || '不明');
      btn.disabled = false;
      return;
    }
    const data = await res.json();
    if (data.status === 'done') {
      await _onGenerateDone();
      return;
    }
    _startPolling(msg, btn);
  } catch(e) {
    msg.textContent = 'エラー: ' + e.message;
    btn.disabled = false;
  }
}

function _startPolling(msg, btn) {
  let elapsed = 0;
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(async () => {
    elapsed += 15;
    try {
      const s = await fetch('/api/generate/status').then(r => r.json());
      if (s.status === 'done') {
        clearInterval(_pollTimer);
        _pollTimer = null;
        await _onGenerateDone();
      } else if (s.status === 'error') {
        clearInterval(_pollTimer);
        _pollTimer = null;
        msg.textContent = 'エラー: ' + (s.detail || '生成失敗');
        btn.disabled = false;
      } else if (s.status === 'idle') {
        // サーバー再起動でジョブが消えた → 自動で再リクエスト
        clearInterval(_pollTimer);
        _pollTimer = null;
        msg.innerHTML = '<span class="spinner"></span>サーバー再起動を検知。生成を再開します...';
        await new Promise(r => setTimeout(r, 2000));
        const res = await fetch('/api/generate', { method: 'POST' });
        if (res.ok) {
          _startPolling(msg, btn);
        } else {
          msg.textContent = '再起動後の再開に失敗しました。ページをリロードして再試行してください。';
          btn.disabled = false;
        }
      } else {
        msg.innerHTML = `<span class="spinner"></span>AIが分析中... (${elapsed}秒経過)`;
      }
    } catch(e) {
      // ネットワーク一時エラーはスキップしてポーリング継続
    }
  }, 15000);
}

async function _onGenerateDone() {
  const msg = document.getElementById('gen-msg');
  const btn = document.getElementById('btn-gen');
  msg.style.display = 'none';
  const detail = await fetch('/api/proposal/today').then(r => r.json());
  if (detail.found) displayProposal(detail);
  await loadStatus();
  btn.disabled = false;
}

// ── 提案表示 ──────────────────────────────────────────────────────────────
function displayProposal(data) {
  proposalId = data.id;
  document.getElementById('proposal-area').style.display = 'block';
  document.getElementById('btn-gen').textContent = '今日の打ち手（再生成）';
  document.getElementById('gen-msg').style.display = 'none';

  const conf = data.confidence || 50;
  const badge = document.getElementById('conf-badge');
  badge.textContent = `自信度: ${conf}%`;
  badge.className = 'confidence-badge ' + (conf >= 70 ? 'conf-high' : conf >= 50 ? 'conf-mid' : 'conf-low');
  document.getElementById('final-proposal').textContent = data.final_proposal || '';

  // 議論詳細
  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('col-screen-body').textContent = data.screening_result || '';
  document.getElementById('col-bull-body').textContent = data.bull_analysis || '';
  document.getElementById('col-bear-body').textContent = data.bear_analysis || '';
  document.getElementById('col-risk-body').textContent = data.risk_analysis || '';

  // 結果入力フォームを初期化（1件目を追加）
  tradeCount = 0;
  document.getElementById('trade-inputs').innerHTML = '';
  document.getElementById('result-card').style.display = 'block';
  addTradeInput();
}

// ── 取引入力欄の追加・削除 ────────────────────────────────────────────────
function addTradeInput(ticker = '', companyName = '', action = 'buy', shares = '', price = '') {
  tradeCount++;
  const n = tradeCount;
  const div = document.createElement('div');
  div.className = 'trade-input';
  div.id = `trade-block-${n}`;
  div.innerHTML = `
    <div class="trade-input-title">取引${n}${ticker ? ' — ' + ticker : ''}</div>
    ${n > 1 ? `<button class="trade-remove" onclick="removeTradeInput(${n})">✕</button>` : ''}
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">銘柄コード</label>
        <input class="form-input trade-ticker" type="text" placeholder="7203.T" value="${ticker}" />
      </div>
      <div class="form-group">
        <label class="form-label">社名</label>
        <input class="form-input trade-company" type="text" placeholder="トヨタ" value="${companyName}" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">買/売</label>
        <select class="form-input trade-action">
          <option value="buy" ${action==='buy'?'selected':''}>買い</option>
          <option value="sell" ${action==='sell'?'selected':''}>売り</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">株数</label>
        <input class="form-input trade-shares" type="number" placeholder="10" value="${shares}" />
      </div>
      <div class="form-group">
        <label class="form-label">約定価格（円）</label>
        <input class="form-input trade-price" type="number" placeholder="2500" value="${price}" />
      </div>
    </div>
    <div class="form-group" id="pnl-group-${n}" style="display:none">
      <label class="form-label">損益（円）</label>
      <input class="form-input trade-pnl" type="number" placeholder="5000" />
    </div>`;
  // 売りのとき損益欄を表示
  div.querySelector('.trade-action').addEventListener('change', function() {
    document.getElementById(`pnl-group-${n}`).style.display = this.value === 'sell' ? 'block' : 'none';
  });
  if (action === 'sell') {
    div.querySelector(`#pnl-group-${n}`).style.display = 'block';
  }
  document.getElementById('trade-inputs').appendChild(div);
}

function removeTradeInput(n) {
  const el = document.getElementById(`trade-block-${n}`);
  if (el) el.remove();
}

// ── 結果保存 ──────────────────────────────────────────────────────────────
async function saveResult() {
  const trades = [];
  document.querySelectorAll('.trade-input').forEach(el => {
    const ticker  = el.querySelector('.trade-ticker')?.value.trim().toUpperCase();
    const company = el.querySelector('.trade-company')?.value.trim() || '';
    const action  = el.querySelector('.trade-action')?.value;
    const shares  = parseInt(el.querySelector('.trade-shares')?.value || '0');
    const price   = parseFloat(el.querySelector('.trade-price')?.value || '0');
    const pnl     = parseInt(el.querySelector('.trade-pnl')?.value || '0');
    if (ticker && action && shares > 0 && price > 0) {
      trades.push({ ticker, company_name: company, action, shares, price, pnl: pnl || 0 });
    }
  });
  if (trades.length === 0) { toast('取引を1件以上入力してください'); return; }

  const res = await fetch('/api/result', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ proposal_id: proposalId, trades }),
  });
  if (res.ok) {
    toast('結果を保存しました');
    await loadStatus();
  } else {
    toast('保存エラー');
  }
}

// ── 履歴 ──────────────────────────────────────────────────────────────────
async function loadHistory() {
  const data = await fetch('/api/history').then(r => r.json()).catch(() => ({ history: [] }));
  const el = document.getElementById('history-list');
  if (!data.history?.length) { el.innerHTML = '<div class="status-msg">履歴がありません</div>'; return; }
  el.innerHTML = data.history.map(h => {
    const pnl = h.day_pnl || 0;
    // 利益=緑、損失=赤
    const pnlClass = pnl > 0 ? 'green' : pnl < 0 ? 'red' : '';
    const pnlText = h.day_pnl != null ? (pnl >= 0 ? '+' : '') + pnl.toLocaleString() + '円' : '未記録';
    const chips = (h.trades || []).map(t =>
      `<span class="trade-chip chip-${t.action}">${t.ticker} ${t.action === 'buy' ? '買' : t.action === 'sell' ? '売' : '保'}</span>`
    ).join('');
    const preview = (h.final_proposal || '').substring(0, 60) + '...';
    return `<div class="history-item">
      <div class="history-header"><span class="history-date">${h.date}</span><span class="${pnlClass}" style="font-weight:700">${pnlText}</span></div>
      ${chips ? `<div style="margin:5px 0">${chips}</div>` : ''}
      <div class="history-preview">${preview}</div>
    </div>`;
  }).join('');
}

// ── 設定保存 ──────────────────────────────────────────────────────────────
async function saveSettings() {
  const capital  = parseInt(document.getElementById('set-capital').value);
  const cash     = parseInt(document.getElementById('set-cash').value);
  const target   = parseInt(document.getElementById('set-target').value);
  const deadline = document.getElementById('set-deadline').value;
  if ([capital, cash, target].some(isNaN) || !deadline) { toast('全項目を入力してください'); return; }
  const res = await fetch('/api/setup', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ capital, current_cash: cash, target_amount: target, deadline }),
  });
  if (res.ok) { toast('設定を保存しました'); await loadStatus(); }
}

// ── 折りたたみ ────────────────────────────────────────────────────────────
function toggleCol(id) {
  document.getElementById(id).classList.toggle('open');
}

function showTab(btn, name) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') loadHistory();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
